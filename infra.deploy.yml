---
version: 1

# Inventory service id (from markster-ops inventory/services.yml)
service_id: dealpulse-mcp

# Environment names for deployment commands
envs:
  production: prod

# Optional mapping from repo env names to inventory env names.
# Example: if your repo uses "production" but inventory uses "prod".
# envs:
#   production: prod
#   staging: staging

# Optional runtime metadata (informational today).
# Keep provider-specific IDs in markster-ops inventory; this repo should only
# reference Markster service ids.

# Recommended playbook:
# - UI build is enforced by npm start (runs `npm run build` before server boot).
#   This guarantees the MCP UI resource serves built `dist/resources/app.html`.
# - Set runtime keys:
#   marksterctl env set MARKSTER_TOOL_CALL_LOGGING=true --service dealpulse-mcp --env prod --approve --force
#   marksterctl env push --service dealpulse-mcp --env prod --approve
# - Deploy to this service:
#   marksterctl deploy --service dealpulse-mcp --approve
# - Validate:
#   marksterctl status --service dealpulse-mcp
#   marksterctl health --service dealpulse-mcp
