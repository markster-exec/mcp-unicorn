iconography_and_media:
  style: minimal vector + dashboard-like data visuals
  imagery_direction:
    - owner stories / proof
    - dashboard snippets
    - process cards
    - clean business context over abstract art
  motion:
    approach: subtle, intentional, non-distracting
    use:
      - hover lift on cards
      - soft shadows
      - AOS-style progressive content reveal

accessibility:
  contrast_goal: WCAG 2.0 AA intent
  text_size:
    base: 16px
    responsive: clear scaling in mobile breakpoints
  contrast_checks:
    - Blue-on-text pairings used for links/buttons and headings
    - muted neutral body text kept readable on white backgrounds

content_rules:
  headline_pattern:
    - Pain + consequence
    - What they get + proof
    - Direct offer with low friction next step
  cta_pattern:
    - imperative action verbs
    - clear ownership
    - low-friction trial framing (14-day, start/test tour language)
    - risk reduction statements
  forbids:
    - buzzword-only storytelling
    - unbounded guarantees
    - dark, heavy emotional pressure

platform_guidance:
  theme: web-first, service-B2B growth systems
  ui_density: moderate; breathable spacing and strong section hierarchy
  primary_layout_pattern:
    - hero statement
    - pain/diagnosis section
    - proof blocks
    - step-by-step onboarding
    - social proof
    - direct CTA footer
  responsive_breakpoints_observed:
    - "≤857px"
    - "≤767px"
    - "1000px (header/mobile swap)"
  copy_length: short paragraphs with high-signal numerics (K, %, time, $, ROI)

