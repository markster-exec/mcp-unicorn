identity:
  brand_name: Markster
  category: Revenue systems / AI growth operations for service businesses
  positioning:
    - Operator-first growth system
    - Owner-approved execution
    - Predictable pipeline and recurring revenue discipline
  mission_tone: practical, direct, owner-centric, execution focused

voice_and_copy:
  principles:
    - Direct and unflinching about the problem
    - Claims backed by proof examples and outcomes
    - Founder-level credibility, no hype language
    - Short decision-framed messaging with clear next step
    - Confidence without overpromising; includes risk-reduction language
  dos:
    - Use concise, operator-style language
    - Lead with measurable business outcomes
    - Use active voice and clear imperatives
    - Keep approvals and accountability visible in flow
  donts:
    - Avoid jargon-heavy abstract marketing fluff
    - Avoid ambiguous promises with no proof
    - Avoid over-styled copy detached from execution value
  voice:
    archetype: operator
    formality: confident-professional
    energy: calm-but-urgent
    personality: [direct, transparent, owner-respecting]
  preferred_terms:
    - growth system
    - playbooks
    - qualified conversations
    - response time
    - owner approval
    - results

